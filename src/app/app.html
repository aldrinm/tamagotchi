<main class="app-shell">
  <header>
    <h1>Tamagotchi</h1>
    <p>Phase 1: Living Vitals (Ticking Meters)</p>
  </header>

  <section class="pet-card" aria-label="Pet area">
    <h2>{{ pet.name }}</h2>
    <p class="state-indicator" aria-label="Current pet state">State: {{ state }}</p>

    <ul class="vitals" aria-label="Pet vitals">
      <li>
        <span>Hunger</span>
        <div class="meter-container">
          <div class="meter-bar" [style.width.%]="stats.hunger" aria-hidden="true"></div>
        </div>
        <span>{{ stats.hunger }}%</span>
      </li>
      <li>
        <span>Happiness</span>
        <div class="meter-container">
          <div class="meter-bar" [style.width.%]="stats.happiness" aria-hidden="true"></div>
        </div>
        <span>{{ stats.happiness }}%</span>
      </li>
      <li>
        <span>Energy</span>
        <div class="meter-container">
          <div class="meter-bar" [style.width.%]="stats.energy" aria-hidden="true"></div>
        </div>
        <span>{{ stats.energy }}%</span>
      </li>
    </ul>
  </section>
</main>
