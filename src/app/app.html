<main class="app-shell">
  <header>
    <h1>Tamagotchi</h1>
    <p>Phase 3: Dynamic States (Normal / Sick / Evolved)</p>
  </header>

  <section class="pet-card" aria-label="Pet area">
    <h2>{{ pet.name }}</h2>
    <p class="state-indicator" [class.state-sick]="state === 'Sick'" aria-label="Current pet state">State: {{ state }}</p>

    <div class="pet-blob" [class]="'state-' + state.toLowerCase()" aria-hidden="true">
      @if (state === 'Evolved') {
        <div class="hair-container">
          <div class="hair"></div>
          <div class="hair"></div>
          <div class="hair"></div>
        </div>
      }
      <div class="eyes" [class]="'eyes-' + eyeState()">
        <div class="eye left"></div>
        <div class="eye right"></div>
      </div>
      <div class="mouth" [class]="'mouth-' + mouthState()"></div>
      @if (reactionText()) {
        <div class="bubble">{{ reactionText() }}</div>
      }
    </div>

    <ul class="vitals" aria-label="Pet vitals">
      <li>
        <span>Hunger</span>
        <div class="meter-container">
          <div class="meter-bar" [style.width.%]="stats.hunger" aria-hidden="true"></div>
        </div>
        <span>{{ stats.hunger }}%</span>
      </li>
      <li>
        <span>Happiness</span>
        <div class="meter-container">
          <div class="meter-bar" [style.width.%]="stats.happiness" aria-hidden="true"></div>
        </div>
        <span>{{ stats.happiness }}%</span>
      </li>
      <li>
        <span>Energy</span>
        <div class="meter-container">
          <div class="meter-bar" [style.width.%]="stats.energy" aria-hidden="true"></div>
        </div>
        <span>{{ stats.energy }}%</span>
      </li>
    </ul>

    <div class="actions" aria-label="Pet actions">
      <button (click)="feed()" aria-label="Feed the pet">Feed</button>
      <button (click)="play()" aria-label="Play with the pet">Play</button>
      <button (click)="rest()" aria-label="Let the pet rest">Rest</button>
    </div>
  </section>
</main>
